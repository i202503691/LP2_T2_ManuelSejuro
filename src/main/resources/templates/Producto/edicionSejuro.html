<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>Ejemplos Prof. Ernesto Arbulú</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.21.0/jquery.validate.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">
				<h1 class="card-title text-center" th:text="|Orden de compra edición - Nro. ${orden.nroOrden}|"></h1>
				<div class="row d-flex justify-content-center">
					<div class="col-md-6">
						<form th:action="@{/orden/guardar}" th:object="${orden}" class="row g-2" method="post"
							novalidate>
							<input type="hidden" th:field="*{nroOrden}">
							<div class="col-md-6 position-relative">
								<label for="proveedor" class="form-label">Proveedor</label>
								<select class="form-select" th:field="*{proveedor}">
									<option value="" selected hidden="hidden">--Seleccione--
									</option>
									<option th:each="item: ${proveedores}" th:value="${item.idProveedor}"
										th:text="|${item.ruc} - ${item.razonSocial}|"></option>
								</select>
							</div>
							<div class="col-md-6 position-relative">
								<label for="monto" class="form-label">Monto</label>
								<div class="input-group">
									<span class="input-group-text">S/.</span>
									<input type="number" class="form-control" step="0.01" placeholder="0.00"
										th:field="*{monto}" required>
								</div>
							</div>
							<div class="col-md-12 position-relative">
								<label for="direccionEntrega" class="form-label">Dirección de entrega</label>
								<input type="text" class="form-control" placeholder="Ingrese una dirección de entrega"
									th:field="*{direccionEntrega}" required>
							</div>
							<div class="col-md-6 position-relative">
								<label for="fechaEntrega" class="form-label">Fecha de entrega</label>
								<input type="date" class="form-control" th:field="*{fechaEntrega}" required>
							</div>
							<div class="col-md-6 position-relative">
								<label for="estado" class="form-label">Estado</label>
								<select class="form-select" th:field="*{estado}">
									<option value="" selected hidden="hidden">--Seleccione--</option>
									<option value="P">Pendiente</option>
									<option value="C">Completado</option>
									<option value="A">Anulado</option>
								</select>
							</div>
							<div class="col-md-12 d-flex justify-content-between">
								<a th:href="@{/orden/listado}" class="btn btn-outline-dark">
									<i class="fa-solid fa-reply"></i> Regresar
								</a>
								<button type="submit" class="btn btn-primary">
									<i class="fa-solid fa-floppy-disk"></i> Guardar
								</button>
								<button type="reset" class="btn btn-secondary">
									<i class="fa-solid fa-broom"></i> Limpiar
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script type="text/javascript">
		$(document)
			.ready(
				function () {
					$("")
						.validate(
							{
								rules: {

								},
								messages: {

								},
								errorElement: 'div',
								errorClass: 'invalid-tooltip',
								highlight: function (element) {
									$(element).addClass(
										'is-invalid')
										.removeClass(
											'is-valid');
								},
								unhighlight: function (element) {
									$(element).removeClass(
										'is-invalid')
										.addClass(
											'is-valid');
								}
							});
				});
	</script>
	<th:block th:utext="${alert}"></th:block>
</body>

</html>
