<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Ejemplos Prof. Ernesto Arbulú</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">
				<div class="row">
					<div class="col-md-10">
						<h1 class="card-title">Listado de órdenes de compra</h1>
					</div>
					<div class="col-md-2">
						<a th:href="@{/orden/nuevo}" class="btn btn-success w-100"> <i class="fa-solid fa-plus"></i>
							Nuevo
						</a>
					</div>
				</div>
				<div class="table-responsive" style="max-width: 1400px; overflow-x: auto;">
					<table class="table table-hover">
						<thead class="table-dark text-center">
							<tr>
								<th>Número</th>
								<th>Fecha de entrega</th>
								<th>Dirección de entrega</th>
								<th>Proveedor</th>
								<th>Rubro</th>
								<th>Página web</th>
								<th>Monto</th>
								<th>Estado</th>
								<th>Acciones</th>
							</tr>
						</thead>
						<tbody class="table-secondary text-nowrap">
							<tr th:each="item: ${lstOrdenes}">
								<td th:text="${item.nroOrden}" class="text-center"></td>
								<td th:text="${item.fechaEntrega}"></td>
								<td th:text="${item.direccionEntrega}"></td>
								<td th:text="|${item.proveedor.ruc} - ${item.proveedor.razonSocial}|"></td>
								<td th:text="${item.proveedor.rubroSejuro.denominacion}"></td>
								<td th:text="${item.proveedor.paginaWeb}"></td>
								<td th:text="|S/. ${#numbers.formatDecimal(item.monto, 1, 'COMMA', 2, 'POINT')}|"
									class="text-end"></td>
								<td>
									<span class="badge"
										th:classappend="${item.estado == 'P'} ? ' bg-warning text-dark' : (${item.estado == 'C'} ? ' bg-success' : ' bg-danger')"
										th:text="${item.estadoDescripcion}">
									</span>
								</td>
								<td class="text-center align-middle">
									<a th:href="@{/orden/edicion/{id}(id=${item.nroOrden})}"
										class="btn btn-outline-primary" title="Editar">
										<i class="fa-regular fa-pen-to-square"></i>
									</a>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
	<th:block th:utext="${toast}"></th:block>
</body>

</html>
